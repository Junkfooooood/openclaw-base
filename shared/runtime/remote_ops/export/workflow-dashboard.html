    <title>OpenClaw Remote Ops Dashboard</title>
    <style>
      :root {
        --bg: #f5efe2;
        --card: rgba(255, 252, 245, 0.9);
        --ink: #132a13;
        --muted: #4f6f52;
        --line: rgba(19, 42, 19, 0.12);
        --accent: #b46a55;
        --accent-soft: #e8d7c5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "PingFang SC", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(180, 106, 85, 0.18), transparent 38%),
          radial-gradient(circle at bottom right, rgba(79, 111, 82, 0.16), transparent 35%),
          var(--bg);
      }
      main {
        width: min(1200px, calc(100vw - 32px));
        margin: 32px auto 48px;
      }
      .hero {
        background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(232,215,197,0.92));
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(19, 42, 19, 0.08);
      }
      .hero h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 5vw, 52px);
        letter-spacing: -0.04em;
      }
      .hero p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
        margin-top: 18px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(19, 42, 19, 0.04);
      }
      h2, h3 {
        margin: 0 0 12px;
        letter-spacing: -0.03em;
      }
      ul {
        margin: 0;
        padding-left: 18px;
        color: var(--muted);
      }
      .tasks {
        margin-top: 24px;
        display: grid;
        gap: 16px;
      }
      .task {
        background: rgba(255, 252, 245, 0.94);
        border: 1px solid var(--line);
        border-radius: 24px;
        overflow: hidden;
      }
      .task-header {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: space-between;
        padding: 18px 20px 12px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(90deg, rgba(180,106,85,0.12), rgba(255,255,255,0.6));
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 6px 10px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
      }
      .branches {
        padding: 16px 20px 20px;
        display: grid;
        gap: 12px;
      }
      .branch {
        border-left: 4px solid var(--accent);
        padding-left: 12px;
      }
      .muted {
        color: var(--muted);
      }
      .code {
        display: block;
        margin-top: 6px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(19, 42, 19, 0.06);
        font-family: "SF Mono", Menlo, monospace;
        font-size: 12px;
        overflow-x: auto;
      }
    </style>
