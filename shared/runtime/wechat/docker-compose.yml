services:
  mysql:
    image: mysql:8.0
    container_name: openclaw-wechat-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    volumes:
      - openclaw_wechat_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: openclaw-wechat-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - openclaw_wechat_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12

  wechatpadpro:
    image: wechatpadpro/wechatpadpro:${WECHAT_TAG}
    container_name: openclaw-wechatpadpro
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${WECHAT_API_PORT}:1238"
      - "${WECHAT_WORKER_PORT}:8080"
    environment:
      TZ: ${TZ}
      ADMIN_KEY: ${ADMIN_KEY}
      MYSQL_CONNECT_STR: "${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?charset=utf8mb4&parseTime=true&loc=Local"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB}
      WEB_DOMAIN: ${WEB_DOMAIN}
      NEWS_SYN_WXID: ${NEWS_SYN_WXID}
      DT: ${DT}

volumes:
  openclaw_wechat_mysql:
  openclaw_wechat_redis:
